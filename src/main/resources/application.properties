spring.application.name=vibecolombia

# Base de datos H2
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Admin password
admin.password=2026Vibecolombia*

# Servir imagenes desde tmp en Render
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/,file:/tmp/images/
# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false