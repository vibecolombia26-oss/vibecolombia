<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.id != null ? 'Editar' : 'Nuevo'} + ' Producto'">Formulario</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        .container { max-width: 750px; margin: 0 auto; padding: 20px; }
        .form-container { background: rgba(20,20,20,0.9); border: 2px solid #ff00ff; border-radius: 20px; padding: 30px; }
        h1 { text-align: center; margin-bottom: 25px; color: #ff00ff; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #00ffff; font-size: 0.8rem; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 0.9rem; }
        input:focus, textarea:focus { border-color: #ff00ff; outline: none; }
        textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
        .btn-guardar { width: 100%; padding: 15px; margin-top: 20px; background: linear-gradient(45deg, #ff00ff, #cc00cc); color: #fff; font-size: 0.95rem; font-weight: 700; border: none; border-radius: 25px; cursor: pointer; text-transform: uppercase; }
        .btn-guardar:hover { box-shadow: 0 0 30px rgba(255,0,255,0.6); }
        .btn-volver { display: inline-block; margin-bottom: 15px; color: #00ffff; text-decoration: none; padding: 8px 16px; border: 1px solid #00ffff; border-radius: 25px; font-size: 0.85rem; }
        .imagen-actual { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); margin: 5px; }
        .section-title { color: #ff00ff; margin: 20px 0 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <a th:href="@{/admin/panel(key=${key})}" class="btn-volver">← Volver</a>
    <div class="form-container">
        <h1 th:text="${producto.id != null ? 'Editar Producto' : 'Nuevo Producto'}">Formulario</h1>
        <form th:action="@{/admin/guardar}" method="post">
            <input type="hidden" name="key" th:value="${key}">
            <input type="hidden" name="id" th:value="${producto.id}">
            <div class="form-group"><label>Nombre *</label><input type="text" name="nombre" th:value="${producto.nombre}" required></div>
            <div class="form-row">
                <div class="form-group"><label>Precio (COP) *</label><input type="number" name="precio" th:value="${producto.precio}" step="0.01" required></div>
                <div class="form-group"><label>SKU</label><input type="text" name="sku" th:value="${producto.sku}"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Categoría</label><select name="categoria"><option value="">Seleccionar...</option><option value="Hogar" th:selected="${producto.categoria == 'Hogar'}">Hogar</option><option value="Cultivo" th:selected="${producto.categoria == 'Cultivo'}">Cultivo</option><option value="Tecnología" th:selected="${producto.categoria == 'Tecnología'}">Tecnología</option><option value="Ropa" th:selected="${producto.categoria == 'Ropa'}">Ropa</option><option value="Calzado" th:selected="${producto.categoria == 'Calzado'}">Calzado</option></select></div>
                <div class="form-group"><label>Descripción corta</label><textarea name="descripcion" th:text="${producto.descripcion}"></textarea></div>
            </div>
            <div class="form-group"><label>Descripción larga</label><textarea name="descripcionLarga" th:text="${producto.descripcionLarga}" style="min-height:120px;"></textarea></div>

            <div class="form-group" style="margin-top:20px;">
                <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                    <input type="checkbox" id="tieneVariacionesChk" name="tieneVariaciones" th:checked="${producto.tieneVariaciones}" onchange="toggleVariaciones()" style="width:auto;">
                    ¿Este producto tiene variaciones? (Talla, Color)
                </label>
            </div>
            <div id="variacionesSection" style="display:none; background:rgba(255,0,255,0.05); padding:15px; border-radius:10px; margin-bottom:15px;">
                <h3 style="color:#ff00ff; margin-bottom:10px;">🎨 Variaciones</h3>
                <div class="form-group"><label>Colores (separados por coma)</label><input type="text" id="coloresInput" placeholder="Rojo, Azul, Negro"></div>
                <div class="form-group"><label>Tallas (separadas por coma)</label><input type="text" id="tallasInput" placeholder="38, 40, 42, 44"></div>
                <input type="hidden" name="variacionesDisponibles" id="variacionesDisponibles" th:value="${producto.variacionesDisponibles}">
            </div>

            <h3 class="section-title">Imágenes (pega la URL de Cloudinary)</h3>
            <div class="form-row">
                <div class="form-group"><label>Imagen 1</label><input type="text" name="imagen1File" placeholder="https://res.cloudinary.com/..."><img th:if="${producto.imagen1 != null}" class="imagen-actual" th:src="${producto.imagen1}"></div>
                <div class="form-group"><label>Imagen 2</label><input type="text" name="imagen2File" placeholder="https://res.cloudinary.com/..."><img th:if="${producto.imagen2 != null}" class="imagen-actual" th:src="${producto.imagen2}"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Imagen 3</label><input type="text" name="imagen3File" placeholder="https://res.cloudinary.com/..."><img th:if="${producto.imagen3 != null}" class="imagen-actual" th:src="${producto.imagen3}"></div>
                <div class="form-group"><label>Imagen 4</label><input type="text" name="imagen4File" placeholder="https://res.cloudinary.com/..."><img th:if="${producto.imagen4 != null}" class="imagen-actual" th:src="${producto.imagen4}"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Imagen 5</label><input type="text" name="imagen5File" placeholder="https://res.cloudinary.com/..."><img th:if="${producto.imagen5 != null}" class="imagen-actual" th:src="${producto.imagen5}"></div>
                <div class="form-group"><label>Imagen 6</label><input type="text" name="imagen6File" placeholder="https://res.cloudinary.com/..."><img th:if="${producto.imagen6 != null}" class="imagen-actual" th:src="${producto.imagen6}"></div>
            </div>

            <button type="submit" class="btn-guardar">💾 Guardar Producto</button>
        </form>
    </div>
</div>
<script>
    function toggleVariaciones() {
        document.getElementById('variacionesSection').style.display = document.getElementById('tieneVariacionesChk').checked ? 'block' : 'none';
    }
    window.addEventListener('load', function() {
        toggleVariaciones();
        var v = document.getElementById('variacionesDisponibles').value;
        if (v && v.includes('|')) { var p = v.split('|'); document.getElementById('coloresInput').value = p[0]||''; document.getElementById('tallasInput').value = p[1]||''; }
    });
    document.querySelector('form').addEventListener('submit', function() {
        document.getElementById('variacionesDisponibles').value = document.getElementById('coloresInput').value + '|' + document.getElementById('tallasInput').value;
    });
</script>
</body>
</html>
