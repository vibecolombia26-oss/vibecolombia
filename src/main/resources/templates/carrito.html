<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - VIBE COLOMBIA 26</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255,0,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px); background-size: 60px 60px; z-index: 0; }
        .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; font-size: 2rem; font-weight: 900; letter-spacing: 4px; background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientShift 3s ease infinite; }
        @keyframes gradientShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .subtitle { text-align: center; color: #00ffff; margin-bottom: 30px; font-size: 1rem; }
        .back-btn { display: inline-block; color: #00ffff; text-decoration: none; padding: 10px 20px; margin-bottom: 20px; border: 1px solid #00ffff; border-radius: 25px; transition: all 0.3s; }
        .back-btn:hover { background: rgba(0,255,255,0.1); box-shadow: 0 0 20px rgba(0,255,255,0.3); }
        .cart-item { background: rgba(20,20,20,0.85); border: 2px solid #ff00ff; border-radius: 16px; padding: 20px; margin-bottom: 15px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .cart-item img { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; border: 2px solid #ff00ff; }
        .cart-item-info { flex: 1; min-width: 200px; }
        .cart-item-name { font-size: 1.1rem; font-weight: 700; }
        .cart-item-price { color: #00ffff; font-size: 1.3rem; font-weight: 900; margin: 5px 0; }
        .quantity-control { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #ff00ff; color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
        .qty-btn:hover { box-shadow: 0 0 15px rgba(255,0,255,0.6); }
        .qty-input { width: 50px; text-align: center; background: #111; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 8px; }
        .remove-btn { background: #ff0044; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .remove-btn:hover { box-shadow: 0 0 15px rgba(255,0,68,0.6); }
        .cart-empty { text-align: center; padding: 60px 20px; color: #666; }
        .cart-total { text-align: right; font-size: 1.5rem; padding: 20px; background: rgba(20,20,20,0.85); border: 2px solid #00ffff; border-radius: 16px; margin: 20px 0; }
        .cart-total span { color: #00ffff; font-weight: 900; font-size: 2rem; }
        .form-section { background: rgba(20,20,20,0.85); border: 2px solid #ff00ff; border-radius: 20px; padding: 30px; margin: 30px 0; }
        .form-section h2 { color: #ff00ff; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { display: block; margin-bottom: 5px; color: #00ffff; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: #111; border: 2px solid #333; border-radius: 10px; color: #fff; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #ff00ff; box-shadow: 0 0 15px rgba(255,0,255,0.2); }
        .btn-submit { display: block; width: 100%; padding: 18px; text-align: center; background: linear-gradient(45deg, #ff00ff, #cc00cc); color: #fff; font-size: 1.2rem; font-weight: 700; border: none; border-radius: 25px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; margin-top: 20px; }
        .btn-submit:hover { box-shadow: 0 0 30px rgba(255,0,255,0.6); transform: scale(1.02); }
        .btn-cancel { display: block; width: 100%; padding: 14px; text-align: center; background: transparent; color: #ff0044; font-size: 1rem; border: 1px solid #ff0044; border-radius: 25px; cursor: pointer; margin-top: 10px; }
        .btn-cancel:hover { background: rgba(255,0,68,0.1); }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .cart-item { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">
    <a href="/" class="back-btn">← Volver a la tienda</a>
    <h1>🛒 Tu Carrito</h1>
    <p class="subtitle">✦ VIBE COLOMBIA 26 ✦</p>
    <div id="cartItems"></div>
    <div id="cartTotal" class="cart-total"></div>
    <div id="cartEmpty" class="cart-empty" style="display:none;"><p>🛍️ Tu carrito está vacío</p><a href="/" style="color:#ff00ff;">Ver productos</a></div>
    <div id="checkoutForm" class="form-section" style="display:none;">
        <h2>📋 Información de envío</h2>
        <div class="form-row">
            <div class="form-group full"><label>Nombre completo *</label><input type="text" id="nombreCliente" placeholder="Tu nombre completo" required></div>
            <div class="form-group"><label>Teléfono *</label><input type="tel" id="telefono" placeholder="3001234567" required></div>
            <div class="form-group"><label>Correo electrónico</label><input type="email" id="email" placeholder="tucorreo@email.com"></div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Departamento *</label>
                <select id="departamento" required>
                    <option value="">Seleccionar departamento...</option>
                    <option>Amazonas</option><option>Antioquia</option><option>Arauca</option><option>Atlántico</option>
                    <option>Bogotá D.C.</option><option>Bolívar</option><option>Boyacá</option><option>Caldas</option>
                    <option>Caquetá</option><option>Casanare</option><option>Cauca</option><option>Cesar</option>
                    <option>Chocó</option><option>Córdoba</option><option>Cundinamarca</option><option>Guainía</option>
                    <option>Guaviare</option><option>Huila</option><option>La Guajira</option><option>Magdalena</option>
                    <option>Meta</option><option>Nariño</option><option>Norte de Santander</option><option>Putumayo</option>
                    <option>Quindío</option><option>Risaralda</option><option>San Andrés y Providencia</option>
                    <option>Santander</option><option>Sucre</option><option>Tolima</option><option>Valle del Cauca</option>
                    <option>Vaupés</option><option>Vichada</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ciudad *</label>
                <select id="ciudad" required>
                    <option value="">Primero selecciona un departamento</option>
                </select>
            </div>
        </div>
        <div class="form-row"><div class="form-group full"><label>Dirección *</label><input type="text" id="direccion" placeholder="Calle, carrera, número, barrio" required></div></div>
        <div class="form-row"><div class="form-group"><label>Tienda</label><select id="tienda"><option>VIBE COLOMBIA 26</option></select></div><div class="form-group"><label>Notas (opcional)</label><input type="text" id="notas" placeholder="Instrucciones especiales..."></div></div>
        <h2>🚚 Envío</h2>
        <div style="background:rgba(255,0,255,0.05);border:2px solid #ff00ff;border-radius:12px;padding:25px;text-align:center;margin:15px 0;">
            <div style="font-size:2.5rem;">🚀</div>
            <h3 style="color:#ff00ff;">¡ENVÍO GRATIS!</h3>
            <p style="color:#aaa;">A cualquier parte de Colombia</p>
        </div>
        <h2>💰 Resumen</h2>
        <div id="orderSummary" style="background:#111;padding:20px;border-radius:12px;margin-top:10px;"></div>
        <button class="btn-submit" onclick="completarOrden()">✅ COMPLETAR ORDEN</button>
        <button class="btn-cancel" onclick="cancelarOrden()">❌ Cancelar</button>
        <p style="text-align:center;color:#ff00ff;margin-top:15px;font-weight:700;">💵 Pago contra entrega</p>
    </div>
</div>

<script>
    let carrito = JSON.parse(localStorage.getItem('carritoVibeColombia')) || [];
    function guardarCarrito() { localStorage.setItem('carritoVibeColombia', JSON.stringify(carrito)); }
    function renderCarrito() {
        const container = document.getElementById('cartItems'), totalDiv = document.getElementById('cartTotal'), emptyDiv = document.getElementById('cartEmpty'), checkoutForm = document.getElementById('checkoutForm');
        if (carrito.length === 0) { container.innerHTML = ''; totalDiv.innerHTML = ''; emptyDiv.style.display = 'block'; checkoutForm.style.display = 'none'; return; }
        emptyDiv.style.display = 'none'; checkoutForm.style.display = 'block';
        let html = '', total = 0;
        carrito.forEach((item, index) => {
            const precio = Number(item.precio) || 0, cantidad = Number(item.cantidad) || 1, subtotal = precio * cantidad;
            total += subtotal;
            html += '<div class="cart-item"><img src="' + (item.imagen || '') + '" alt="' + item.nombre + '" onerror="this.style.display=\'none\'"><div class="cart-item-info"><div class="cart-item-name">' + item.nombre + '</div><div class="cart-item-price">$' + precio.toLocaleString('es-CO') + '</div><div class="quantity-control"><button class="qty-btn" onclick="cambiarCantidad(' + index + ',-1)">−</button><input class="qty-input" type="number" value="' + cantidad + '" min="1" onchange="cambiarCantidad(' + index + ',0,this.value)"><button class="qty-btn" onclick="cambiarCantidad(' + index + ',1)">+</button><span style="margin-left:10px;">Subtotal: $' + subtotal.toLocaleString('es-CO') + '</span></div></div><button class="remove-btn" onclick="eliminarItem(' + index + ')">🗑️</button></div>';
        });
        container.innerHTML = html; totalDiv.innerHTML = '<strong>Total:</strong> <span>$' + total.toLocaleString('es-CO') + '</span>'; renderOrderSummary();
    }
    function cambiarCantidad(index, delta, valorDirecto) { if (valorDirecto) carrito[index].cantidad = Math.max(1, parseInt(valorDirecto) || 1); else carrito[index].cantidad = Math.max(1, (Number(carrito[index].cantidad) || 1) + delta); guardarCarrito(); renderCarrito(); }
    function eliminarItem(index) { carrito.splice(index, 1); guardarCarrito(); renderCarrito(); }
    function renderOrderSummary() {
        const summary = document.getElementById('orderSummary'); let total = 0, html = '';
        carrito.forEach(item => { const precio = Number(item.precio) || 0, cantidad = Number(item.cantidad) || 1, subtotal = precio * cantidad; total += subtotal; html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #222;"><span>' + item.nombre + ' x' + cantidad + '</span><span>$' + subtotal.toLocaleString('es-CO') + '</span></div>'; });
        html += '<div style="display:flex;justify-content:space-between;padding:10px 0;color:#ff00ff;font-weight:700;"><span>Envío</span><span>GRATIS</span></div><div style="display:flex;justify-content:space-between;padding:15px 0;font-size:1.3rem;font-weight:900;border-top:2px solid #ff00ff;margin-top:10px;"><span>Total a recaudar</span><span style="color:#00ffff;">$' + total.toLocaleString('es-CO') + '</span></div>';
        summary.innerHTML = html;
    }
    function completarOrden() {
        const nombre = document.getElementById('nombreCliente').value, telefono = document.getElementById('telefono').value, email = document.getElementById('email').value;
        const departamento = document.getElementById('departamento').value, ciudad = document.getElementById('ciudad').value, direccion = document.getElementById('direccion').value, notas = document.getElementById('notas').value;
        if (!nombre || !telefono || !departamento || !ciudad || !direccion) { alert('Completa todos los campos requeridos (*)'); return; }
        let productosTexto = '', total = 0;
        carrito.forEach(item => { const precio = Number(item.precio) || 0, cantidad = Number(item.cantidad) || 1, subtotal = precio * cantidad; total += subtotal; productosTexto += '• ' + item.nombre + ' x' + cantidad + ' · $' + subtotal.toLocaleString('es-CO') + '\n'; });
        const pedido = { nombreCliente: nombre, telefono: telefono, email: email, departamento: departamento, ciudad: ciudad, direccion: direccion, notas: notas, tienda: 'VIBE COLOMBIA 26', productos: productosTexto, total: total, metodoPago: 'Contra entrega' };
        fetch('/api/pedido', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(pedido) })
            .then(r => r.json()).then(data => { localStorage.removeItem('carritoVibeColombia'); carrito = []; renderCarrito(); alert('✅ ¡Pedido confirmado!\nTu código: ' + data.codigo); window.location.href = '/'; })
            .catch(() => { alert('Error al procesar'); });
    }
    function cancelarOrden() { if (confirm('¿Cancelar?')) { localStorage.removeItem('carritoVibeColombia'); carrito = []; renderCarrito(); window.location.href = '/'; } }

    // Municipios
    var municipios = {
        "Amazonas":["Leticia","Puerto Nariño"],"Antioquia":["Medellín","Bello","Envigado","Itagüí","Rionegro","Apartadó","Turbo","Caucasia"],
        "Arauca":["Arauca","Saravena","Tame"],"Atlántico":["Barranquilla","Soledad","Malambo","Puerto Colombia","Sabanalarga"],
        "Bogotá D.C.":["Bogotá"],"Bolívar":["Cartagena","Magangué","Turbaco"],"Boyacá":["Tunja","Duitama","Sogamoso"],
        "Caldas":["Manizales","La Dorada"],"Caquetá":["Florencia"],"Casanare":["Yopal"],"Cauca":["Popayán"],
        "Cesar":["Valledupar","Aguachica"],"Chocó":["Quibdó"],"Córdoba":["Montería","Lorica","Cereté"],
        "Cundinamarca":["Soacha","Facatativá","Zipaquirá","Girardot","Fusagasugá","Chía","Mosquera"],
        "Guainía":["Inírida"],"Guaviare":["San José del Guaviare"],"Huila":["Neiva","Pitalito","Garzón"],
        "La Guajira":["Riohacha","Maicao"],"Magdalena":["Santa Marta","Ciénaga"],"Meta":["Villavicencio","Acacías"],
        "Nariño":["Pasto","Tumaco","Ipiales"],"Norte de Santander":["Cúcuta","Ocaña"],"Putumayo":["Mocoa"],
        "Quindío":["Armenia","Calarcá"],"Risaralda":["Pereira","Dosquebradas"],"San Andrés y Providencia":["San Andrés"],
        "Santander":["Bucaramanga","Floridablanca","Barrancabermeja","Girón","Piedecuesta"],
        "Sucre":["Sincelejo","Corozal"],"Tolima":["Ibagué","Espinal","Melgar"],
        "Valle del Cauca":["Cali","Palmira","Buenaventura","Tuluá","Cartago","Jamundí"],
        "Vaupés":["Mitú"],"Vichada":["Puerto Carreño"]
    };
    document.getElementById('departamento').addEventListener('change', function() {
        var depto = this.value, ciudadSelect = document.getElementById('ciudad');
        ciudadSelect.innerHTML = '<option value="">Seleccionar municipio...</option>';
        if (municipios[depto]) { municipios[depto].forEach(function(m) { ciudadSelect.innerHTML += '<option value="' + m + '">' + m + '</option>'; }); }
    });
    renderCarrito();
</script>
</body>
</html>
