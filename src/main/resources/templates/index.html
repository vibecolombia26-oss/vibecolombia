<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE COLOMBIA 26</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background-color: #0a0a0a;
            overflow: hidden;
        }

        /* Partículas flotantes */
        .particulas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .particula {
            position: absolute;
            border-radius: 50%;
            animation: flotar linear infinite;
            opacity: 0.6;
        }

        @keyframes flotar {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* Grid sutil de fondo */
        .bg-grid::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                    linear-gradient(rgba(255, 0, 255, 0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 50px 20px 30px; }
        .logo {
            font-size: 3.5rem; font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradientShift 3s ease infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 255, 0.5));
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .subtitle {
            font-size: 1.2rem; color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.7); letter-spacing: 3px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; padding: 20px 0;
        }
        .product-card {
            background: rgba(20, 20, 20, 0.85); border: 2px solid #ff00ff; border-radius: 16px;
            padding: 25px; transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2), inset 0 0 20px rgba(255, 0, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .product-card:hover {
            transform: translateY(-8px); border-color: #00ffff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4), 0 0 80px rgba(255, 0, 255, 0.3);
        }
        .product-icon { font-size: 3.5rem; text-align: center; margin-bottom: 15px; }
        .product-name { font-size: 1.3rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 10px; }
        .product-price { font-size: 2rem; font-weight: 900; text-align: center; color: #00ffff; margin: 10px 0; }
        .product-desc { color: #aaa; text-align: center; font-size: 0.9rem; line-height: 1.5; margin-top: 10px; }
        .product-id { display: block; text-align: center; color: #ff00ff; font-size: 0.75rem; margin-top: 15px; }
        footer { text-align: center; padding: 40px 20px; color: #555; font-size: 0.9rem; }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .logo-img {
            width: 60px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 0, 255, 0.6)) drop-shadow(0 0 20px rgba(0, 255, 255, 0.4));
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0);
                filter: drop-shadow(0 0 10px rgba(255, 0, 255, 0.6)) drop-shadow(0 0 20px rgba(0, 255, 255, 0.4));
            }
            50% {
                transform: translateY(-5px);
                filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.9)) drop-shadow(0 0 35px rgba(0, 255, 255, 0.7));
            }
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.5));
            text-shadow: none;
        }
    </style>
</head>
<body>
<div class="bg-grid">
    <div class="particulas" id="particulas"></div>
</div>

<div class="container">
    <header class="header">
        <div class="logo-container">
            <img src="/images/logo-vibe.png" alt="VIBE" class="logo-img">
            <h1 class="logo-text">VIBE COLOMBIA 26</h1>
        </div>
    </header>

    <div class="products-grid">
        <div th:each="producto : ${productos}" class="product-card">
            <a th:href="@{/producto/{id}(id=${producto.id})}" style="text-decoration: none; color: inherit;">
                <img th:if="${producto.imagen1 != null}"
                     th:src="${producto.imagen1}"
                     th:alt="${producto.nombre}"
                     style="width:100%; border-radius:12px; margin-bottom:15px; border:2px solid #ff00ff;">
                <div class="product-icon" th:if="${producto.imagen1 == null}">🛍️</div>
                <h3 class="product-name" th:text="${producto.nombre}">Nombre</h3>
                <div class="product-price" th:text="'$' + ${#numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">Precio</div>
                <p class="product-desc" th:text="${producto.descripcion}">Descripción</p>
                <span class="product-id" th:text="'SKU: ' + ${producto.sku != null ? producto.sku : 'N/A'}">SKU</span>
            </a>
        </div>
    </div>

    <footer>
        <p>⚡ VIBE COLOMBIA 26 ⚡</p>
    </footer>
</div>

<script>
    // Crear partículas neón flotantes
    const particulasContainer = document.getElementById('particulas');
    const colores = ['#ff00ff', '#00ffff', '#ff66ff', '#66ffff', '#cc00ff', '#00ccff'];

    for (let i = 0; i < 40; i++) {
        const particula = document.createElement('div');
        particula.className = 'particula';

        const tamaño = Math.random() * 5 + 3; // 3px a 8px (un poco más grandes)
        const color = colores[Math.floor(Math.random() * colores.length)];
        const left = Math.random() * 100;
        const duracion = Math.random() * 18 + 12; // 12s a 30s
        const delay = Math.random() * 15;

        // Algunas brillan más que otras
        const brilloBase = tamaño * 3;
        const brilloExtra = Math.random() < 0.3 ? brilloBase * 2 : brilloBase; // 30% brillan el doble

        particula.style.cssText = `
            width: ${tamaño}px;
            height: ${tamaño}px;
            background: ${color};
            left: ${left}%;
            box-shadow: 0 0 ${brilloBase}px ${color}, 0 0 ${brilloExtra}px ${color};
            animation-duration: ${duracion}s;
            animation-delay: ${delay}s;
        `;

        particulasContainer.appendChild(particula);
    }
</script>
</body>
</html>
