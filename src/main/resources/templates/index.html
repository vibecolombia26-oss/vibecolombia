<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE COLOMBIA 26</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                    linear-gradient(rgba(255, 0, 255, 0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 50px 20px 30px; }
        .logo {
            font-size: 3.5rem; font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradientShift 3s ease infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 255, 0.5));
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .subtitle {
            font-size: 1.2rem; color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.7); letter-spacing: 3px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; padding: 20px 0;
        }
        .product-card {
            background: rgba(20, 20, 20, 0.85); border: 2px solid #ff00ff; border-radius: 16px;
            padding: 25px; transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2), inset 0 0 20px rgba(255, 0, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .product-card:hover {
            transform: translateY(-8px); border-color: #00ffff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.4), 0 0 80px rgba(255, 0, 255, 0.3);
        }
        .product-icon { font-size: 3.5rem; text-align: center; margin-bottom: 15px; }
        .product-name { font-size: 1.3rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 10px; }
        .product-price { font-size: 2rem; font-weight: 900; text-align: center; color: #00ffff; margin: 10px 0; }
        .product-desc { color: #aaa; text-align: center; font-size: 0.9rem; line-height: 1.5; margin-top: 10px; }
        .product-id { display: block; text-align: center; color: #ff00ff; font-size: 0.75rem; margin-top: 15px; }
        footer { text-align: center; padding: 40px 20px; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">
    <header class="header">
        <h1 class="logo">VIBE COLOMBIA 26</h1>
        <p class="subtitle">✦ NEON ERA ✦</p>
    </header>
    <div class="products-grid">
        <div th:each="producto : ${productos}" class="product-card">
            <div class="product-icon">🌱</div>
            <h3 class="product-name" th:text="${producto.nombre}">Nombre</h3>
            <div class="product-price" th:text="'$' + ${#numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">Precio</div>
            <p class="product-desc" th:text="${producto.descripcion}">Descripción</p>
            <span class="product-id" th:text="'ID: ' + ${producto.id}">ID</span>
        </div>
    </div>
    <footer>
        <p>⚡ VIBE COLOMBIA 26 ⚡</p>
    </footer>
</div>
</body>
</html>
