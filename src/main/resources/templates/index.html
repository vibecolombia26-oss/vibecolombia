<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE COLOMBIA 26</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0; background-color: #0a0a0a; overflow: hidden;
        }
        .particulas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .particula {
            position: absolute; border-radius: 50%;
            animation: flotar linear infinite; opacity: 0.6;
        }
        @keyframes flotar {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .bg-grid::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                    linear-gradient(rgba(255,0,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: center; align-items: center;
            gap: 10px; padding: 12px 20px;
            background: rgba(10,10,10,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,0,255,0.2); flex-wrap: wrap;
        }
        .nav-link {
            color: #aaa; text-decoration: none; padding: 8px 16px;
            border-radius: 25px; transition: all 0.3s; font-size: 0.9rem;
            border: 1px solid transparent; white-space: nowrap;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff; background: rgba(255,0,255,0.15);
            border-color: #ff00ff; box-shadow: 0 0 15px rgba(255,0,255,0.3);
        }
        .cart-nav-link {
            background: rgba(255,0,255,0.2); border-color: #ff00ff !important;
            color: #fff !important; position: relative;
        }
        #cartCount {
            background: #ff00ff; color: #fff; border-radius: 50%;
            padding: 2px 7px; font-size: 0.7rem; margin-left: 5px;
        }

        .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 50px 20px 30px; }
        .logo-container {
            display: flex; align-items: center; justify-content: center;
            gap: 18px; flex-wrap: wrap;
        }
        .logo-img {
            width: 75px; height: 75px; border-radius: 50%; object-fit: cover;
            border: 2px solid #ff00ff;
            filter: drop-shadow(0 0 15px rgba(255,0,255,0.8)) drop-shadow(0 0 30px rgba(0,255,255,0.5));
            animation: logoFloat 3s ease-in-out infinite; transition: all 0.3s ease;
        }
        .logo-img:hover {
            transform: scale(1.15);
            filter: drop-shadow(0 0 25px rgba(255,0,255,1)) drop-shadow(0 0 50px rgba(0,255,255,0.8));
        }
        @keyframes logoFloat {
            0%,100% { transform: translateY(0); filter: drop-shadow(0 0 15px rgba(255,0,255,0.6)) drop-shadow(0 0 30px rgba(0,255,255,0.4)); }
            50% { transform: translateY(-6px); filter: drop-shadow(0 0 25px rgba(255,0,255,0.9)) drop-shadow(0 0 45px rgba(0,255,255,0.7)); }
        }
        .logo-text {
            font-size: 3rem; font-weight: 900; letter-spacing: 6px;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; animation: gradientShift 2s ease infinite;
            text-transform: uppercase;
        }
        @keyframes gradientShift {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .subtitle {
            font-size: 1rem; color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff;
            letter-spacing: 8px; animation: flicker 3s infinite;
            text-transform: uppercase; margin-top: 8px;
        }
        @keyframes flicker {
            0%,100% { opacity: 1; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            50% { opacity: 0.7; text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff; }
        }

        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; padding: 20px 0;
        }
        .product-card {
            background: rgba(20,20,20,0.55); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,0,255,0.25); border-radius: 20px;
            padding: 25px; transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: flex; flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-10px) scale(1.03); border-color: #00ffff;
            box-shadow: 0 0 40px rgba(255,0,255,0.25), 0 0 80px rgba(0,255,255,0.15);
        }
        .product-card img {
            width: 100%; border-radius: 12px; margin-bottom: 15px;
            border: 2px solid rgba(255,0,255,0.3); transition: all 0.3s;
        }
        .product-card:hover img { border-color: #00ffff; box-shadow: 0 0 20px rgba(0,255,255,0.3); }
        .product-icon { font-size: 3.5rem; text-align: center; margin-bottom: 15px; }
        .product-name { font-size: 1.2rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 8px; }
        .product-price { font-size: 1.8rem; font-weight: 900; text-align: center; color: #00ffff; text-shadow: 0 0 15px rgba(0,255,255,0.5); margin: 8px 0; }
        .product-desc { color: #aaa; text-align: center; font-size: 0.85rem; line-height: 1.5; margin-top: 8px; flex-grow: 1; }
        .product-sku { display: block; text-align: center; color: #ff00ff; font-size: 0.7rem; margin-top: 12px; opacity: 0.7; }

        .btn-add-cart {
            width: 100%; margin-top: 12px; padding: 12px;
            background: linear-gradient(45deg, #ff00ff, #cc00cc);
            color: #fff; border: none; border-radius: 10px;
            cursor: pointer; font-weight: 700; font-size: 0.95rem;
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-add-cart:hover {
            box-shadow: 0 0 25px rgba(255,0,255,0.6); transform: scale(1.03);
        }

        footer {
            background: rgba(10,10,10,0.85); border-top: 1px solid rgba(255,0,255,0.2);
            padding: 30px 20px; text-align: center; margin-top: 40px;
            position: relative; z-index: 1;
        }
        .footer-links { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin-bottom: 15px; }
        .footer-links a { color: #00ffff; text-decoration: none; font-size: 0.85rem; transition: all 0.3s; }
        .footer-links a:hover { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .footer-copy { color: #555; font-size: 0.8rem; }

        @media (max-width: 600px) {
            .logo-text { font-size: 2rem; letter-spacing: 3px; }
            .logo-img { width: 55px; height: 55px; }
            .subtitle { letter-spacing: 4px; font-size: 0.85rem; }
            .navbar { gap: 6px; }
            .nav-link { padding: 6px 10px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="bg-grid"><div class="particulas" id="particulas"></div></div>

<nav class="navbar">
    <a href="/" class="nav-link active">✨ Todo</a>
    <a href="#" class="nav-link">🌱 Cultivo</a>
    <a href="#" class="nav-link">🏠 Hogar</a>
    <a href="#" class="nav-link">💻 Tecnología</a>
    <a href="#" class="nav-link">👕 Ropa</a>
    <a href="/carrito" class="nav-link cart-nav-link">🛒 Carrito <span id="cartCount">0</span></a>
</nav>

<div class="container">
    <header class="header">
        <div class="logo-container">
            <img src="/images/logo-vibe.png" alt="VIBE" class="logo-img">
            <h1 class="logo-text">VIBE COLOMBIA 26</h1>
        </div>
        <p class="subtitle">✦ NEON ERA ✦</p>
    </header>

    <div class="products-grid">
        <div th:each="producto : ${productos}" class="product-card">
            <a th:href="@{/producto/{id}(id=${producto.id})}" style="text-decoration: none; color: inherit;">
                <img th:if="${producto.imagen1 != null}" th:src="${producto.imagen1}" th:alt="${producto.nombre}">
                <div class="product-icon" th:if="${producto.imagen1 == null}">🛍️</div>
                <h3 class="product-name" th:text="${producto.nombre}">Nombre</h3>
                <div class="product-price" th:text="'$' + ${#numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">Precio</div>
                <p class="product-desc" th:text="${producto.descripcion}">Descripción</p>
                <span class="product-sku" th:text="'SKU: ' + ${producto.sku != null ? producto.sku : 'N/A'}">SKU</span>
            </a>
            <button class="btn-add-cart"
                    th:attr="onclick='agregarAlCarrito(\'' + ${producto.nombre} + '\', ' + ${producto.precio} + ', \'' + ${producto.imagen1 != null ? producto.imagen1 : ''} + '\')'">
                🛒 Agregar al carrito
            </button>
        </div>
    </div>
</div>

<footer>
    <div class="footer-links">
        <a href="/">Inicio</a>
        <a href="/carrito">Carrito</a>
        <a href="#">Categorías</a>
        <a href="#">Contacto</a>
    </div>
    <p class="footer-copy">⚡ VIBE COLOMBIA 26 &copy; 2026 - Todos los derechos reservados ⚡</p>
</footer>

<script>
    const particulasContainer = document.getElementById('particulas');
    const colores = ['#ff00ff', '#00ffff', '#ff66ff', '#66ffff', '#cc00ff', '#00ccff'];
    for (let i = 0; i < 50; i++) {
        const particula = document.createElement('div');
        particula.className = 'particula';
        const tamaño = Math.random() * 5 + 2;
        const color = colores[Math.floor(Math.random() * colores.length)];
        const left = Math.random() * 100;
        const duracion = Math.random() * 18 + 12;
        const delay = Math.random() * 15;
        const brilloBase = tamaño * 3;
        const brilloExtra = Math.random() < 0.3 ? brilloBase * 2 : brilloBase;
        particula.style.cssText = `
                width:${tamaño}px;height:${tamaño}px;background:${color};left:${left}%;
                box-shadow:0 0 ${brilloBase}px ${color},0 0 ${brilloExtra}px ${color};
                animation-duration:${duracion}s;animation-delay:${delay}s;
            `;
        particulasContainer.appendChild(particula);
    }

    function agregarAlCarrito(nombre, precio, imagen) {
        let carrito = JSON.parse(localStorage.getItem('carritoVibeColombia')) || [];
        carrito.push({ nombre, precio, imagen, cantidad: 1, color: '', talla: '' });
        localStorage.setItem('carritoVibeColombia', JSON.stringify(carrito));
        actualizarContador();
        alert('✅ ¡Agregado al carrito!');
    }

    function actualizarContador() {
        const carrito = JSON.parse(localStorage.getItem('carritoVibeColombia')) || [];
        const countEl = document.getElementById('cartCount');
        if (countEl) countEl.textContent = carrito.length;
    }
    actualizarContador();
    setInterval(actualizarContador, 3000);
</script>
</body>
</html>
