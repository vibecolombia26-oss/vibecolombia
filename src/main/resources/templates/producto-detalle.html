<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.nombre}">VIBE COLOMBIA 26</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; background-color: #0a0a0a; }
        .particula { position: absolute; border-radius: 50%; animation: flotar linear infinite; opacity: 0.5; }
        .particula-emoji { position: absolute; animation: flotarEmoji linear infinite; opacity: 0.4; font-size: 1.5rem; }
        @keyframes flotar { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.7; } 90% { opacity: 0.2; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
        @keyframes flotarEmoji { 0% { transform: translateY(105vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.2; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        .container { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; padding: 20px; }
        .back-btn { display: inline-block; color: #00ffff; text-decoration: none; padding: 10px 20px; margin: 20px 0; border: 1px solid #00ffff; border-radius: 25px; text-transform: uppercase; font-size: 0.85rem; }
        .producto-card { background: rgba(20,20,20,0.85); border: 2px solid #ff00ff; border-radius: 20px; overflow: hidden; box-shadow: 0 0 40px rgba(255,0,255,0.2); }
        .imagen-principal { width: 100%; max-height: 500px; object-fit: contain; display: block; background: rgba(0,0,0,0.3); }
        .imagenes-secundarias { display: flex; gap: 8px; justify-content: center; padding: 12px; background: rgba(0,0,0,0.3); }
        .imagen-secundaria { width: 60px; height: 60px; border-radius: 6px; border: 2px solid rgba(255,0,255,0.3); cursor: pointer; object-fit: cover; }
        .info-section { padding: 30px; }
        .nombre { font-size: 1.8rem; font-weight: 700; color: #fff; }
        .precio { font-size: 2.5rem; font-weight: 900; color: #00ffff; text-shadow: 0 0 20px rgba(0,255,255,0.5); margin-bottom: 10px; }
        .meta { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .sku { color: #ff00ff; }
        .categoria { background: rgba(255,0,255,0.15); color: #ff00ff; padding: 4px 12px; border-radius: 15px; border: 1px solid #ff00ff; font-size: 0.75rem; text-transform: uppercase; }
        .colombia-badge { display: inline-block; margin: 10px 0; padding: 5px 14px; border-radius: 15px; font-size: 0.8rem; background: rgba(255,215,0,0.1); border: 1px solid #ffd700; color: #ffd700; }
        .especificaciones { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; padding: 15px; background: rgba(255,0,255,0.05); border: 1px solid rgba(255,0,255,0.2); border-radius: 10px; text-align: center; }
        .esp-label { color: #888; font-size: 0.7rem; text-transform: uppercase; }
        .esp-value { color: #fff; font-size: 0.95rem; }
        .descripcion { color: #aaa; line-height: 1.8; font-size: 0.9rem; margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 10px; }
        .variaciones { background: rgba(255,0,255,0.05); border: 1px solid #ff00ff; border-radius: 12px; padding: 15px; margin: 20px 0; }
        .variaciones h3 { color: #ff00ff; margin-bottom: 12px; }
        .variacion-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .variacion-group { flex: 1; min-width: 120px; }
        .variacion-group label { color: #00ffff; font-size: 0.8rem; display: block; margin-bottom: 5px; }
        .variacion-group select { width: 100%; padding: 10px; background: #111; border: 1px solid #333; border-radius: 6px; color: #fff; }
        .cantidad-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; padding: 15px; background: rgba(0,255,255,0.05); border-radius: 12px; border: 1px solid rgba(0,255,255,0.2); }
        .qty-btn { background: transparent; color: #ff00ff; border: 1px solid #ff00ff; width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; }
        .qty-input { width: 55px; text-align: center; background: #111; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 6px; }
        .subtotal-display { color: #00ffff; font-weight: 700; }
        .acciones { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-carrito { width: 100%; padding: 16px; background: linear-gradient(45deg, #ff00ff, #cc00cc); color: #fff; border: none; border-radius: 25px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .btn-contraentrega { width: 100%; padding: 16px; background: transparent; color: #00ffff; border: 2px solid #00ffff; border-radius: 25px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .banner-pago { background: rgba(255,0,255,0.05); border: 1px solid rgba(255,0,255,0.2); border-radius: 12px; padding: 15px; text-align: center; margin-top: 15px; }
        .footer-mini { text-align: center; padding: 15px; margin-top: 20px; color: #ffd700; font-size: 0.75rem; }
        @media (max-width: 500px) { .especificaciones { grid-template-columns: repeat(2, 1fr); } .info-section { padding: 20px; } }
    </style>
</head>
<body>
<div class="bg-grid" id="bgAnimado"></div>
<div class="container">
    <a href="/" class="back-btn">← Volver</a>
    <div class="producto-card">
        <img class="imagen-principal" th:src="${producto.imagen1}" th:alt="${producto.nombre}" id="imgPrincipal">
        <div class="imagenes-secundarias" th:if="${producto.imagen2 != null or producto.imagen3 != null or producto.imagen4 != null}">
            <img class="imagen-secundaria" th:src="${producto.imagen1}" onclick="document.getElementById('imgPrincipal').src=this.src">
            <img class="imagen-secundaria" th:if="${producto.imagen2 != null}" th:src="${producto.imagen2}" onclick="document.getElementById('imgPrincipal').src=this.src">
            <img class="imagen-secundaria" th:if="${producto.imagen3 != null}" th:src="${producto.imagen3}" onclick="document.getElementById('imgPrincipal').src=this.src">
            <img class="imagen-secundaria" th:if="${producto.imagen4 != null}" th:src="${producto.imagen4}" onclick="document.getElementById('imgPrincipal').src=this.src">
        </div>
        <div class="info-section">
            <h1 class="nombre" th:text="${producto.nombre}">Nombre</h1>
            <div class="precio" th:text="'$' + ${#numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">Precio</div>
            <div class="meta"><span class="sku" th:text="'Ref: ' + ${producto.sku}">SKU</span><span class="categoria" th:text="${producto.categoria}">Categoría</span></div>
            <div class="colombia-badge">🇨🇴 Envío GRATIS a todo Colombia</div>
            <div class="especificaciones" th:if="${producto.largo != null}">
                <div><div class="esp-label">Largo</div><div class="esp-value" th:text="${producto.largo}">-</div></div>
                <div><div class="esp-label">Ancho</div><div class="esp-value" th:text="${producto.ancho}">-</div></div>
                <div><div class="esp-label">Alto</div><div class="esp-value" th:text="${producto.alto}">-</div></div>
                <div><div class="esp-label">Peso</div><div class="esp-value" th:text="${producto.peso}">-</div></div>
            </div>
            <div class="descripcion" th:text="${producto.descripcionLarga != null ? producto.descripcionLarga : producto.descripcion}">Descripción</div>

            <!-- VARIACIONES -->
            <div class="variaciones" th:if="${producto.tieneVariaciones}">
                <h3>🎨 Personaliza tu producto</h3>
                <div class="variacion-row">
                    <div class="variacion-group">
                        <label>Color</label>
                        <select id="colorSelect">
                            <option value="">Seleccionar</option>
                            <th:block th:each="color : ${#strings.arraySplit(#strings.substringBefore(producto.variacionesDisponibles, '|'), ',')}">
                                <option th:value="${color.trim()}" th:text="${color.trim()}"></option>
                            </th:block>
                        </select>
                    </div>
                    <div class="variacion-group">
                        <label>Talla</label>
                        <select id="tallaSelect">
                            <option value="">Seleccionar</option>
                            <th:block th:each="talla : ${#strings.arraySplit(#strings.substringAfter(producto.variacionesDisponibles, '|'), ',')}">
                                <option th:value="${talla.trim()}" th:text="${talla.trim()}"></option>
                            </th:block>
                        </select>
                    </div>
                </div>
            </div>

            <div class="cantidad-row">
                <label>Cantidad</label><button class="qty-btn" onclick="cambiarCantidad(-1)">−</button>
                <input class="qty-input" type="number" id="cantidad" value="1" min="1" onchange="actualizarSubtotal()">
                <button class="qty-btn" onclick="cambiarCantidad(1)">+</button>
                <span class="subtotal-display" id="subtotalDisplay">= $<span th:text="${#numbers.formatDecimal(producto.precio, 0, 'COMMA', 0, 'POINT')}">0</span></span>
            </div>
            <div class="acciones">
                <button class="btn-carrito" onclick="agregarAlCarrito()">🛒 Agregar al carrito</button>
                <button class="btn-contraentrega" onclick="comprarContraEntrega()">💵 Pagar contra entrega</button>
            </div>
            <div class="banner-pago"><div class="icono">💜</div><h3>Pago contra entrega</h3><p>Recibe tu producto y <strong>pagas al recibirlo</strong>. Envío <strong>GRATIS</strong></p></div>
        </div>
    </div>
    <p class="footer-mini">🇨🇴 Hecho en Colombia con orgullo 🇨🇴</p>
</div>

<script>
    var precioBase = 0;
    window.onload = function() { var t = document.querySelector('.precio').textContent; precioBase = parseInt(t.replace('$','').replace(/\./g,'').replace(/,/g,'').trim()) || 0; };
    function cambiarCantidad(d) { var i = document.getElementById('cantidad'); var v = Math.max(1, (parseInt(i.value)||1) + d); i.value = v; actualizarSubtotal(); }
    function actualizarSubtotal() { var c = parseInt(document.getElementById('cantidad').value)||1; document.getElementById('subtotalDisplay').innerHTML = '= $' + (precioBase*c).toLocaleString('es-CO'); }
    function agregarAlCarrito() {
        var nombre = document.querySelector('.nombre').textContent.trim();
        var imagen = document.getElementById('imgPrincipal')?.src || '';
        var cantidad = parseInt(document.getElementById('cantidad').value) || 1;
        var color = document.getElementById('colorSelect')?.value || '';
        var talla = document.getElementById('tallaSelect')?.value || '';
        var carrito = JSON.parse(localStorage.getItem('carritoVibeColombia')) || [];
        carrito.push({ nombre, precio: precioBase, imagen, cantidad, color, talla });
        localStorage.setItem('carritoVibeColombia', JSON.stringify(carrito));
        var btn = document.querySelector('.btn-carrito'); btn.textContent = '✓ Agregado';
        setTimeout(() => { if (confirm('¿Ver carrito?')) window.location.href = '/carrito'; else btn.textContent = '🛒 Agregar al carrito'; }, 500);
    }
    function comprarContraEntrega() {
        var nombre = document.querySelector('.nombre').textContent.trim();
        var imagen = document.getElementById('imgPrincipal')?.src || '';
        var cantidad = parseInt(document.getElementById('cantidad').value) || 1;
        var color = document.getElementById('colorSelect')?.value || '';
        var talla = document.getElementById('tallaSelect')?.value || '';
        var carrito = JSON.parse(localStorage.getItem('carritoVibeColombia')) || [];
        carrito.push({ nombre, precio: precioBase, imagen, cantidad, color, talla, contraentrega: true });
        localStorage.setItem('carritoVibeColombia', JSON.stringify(carrito));
        window.location.href = '/carrito';
    }
    actualizarSubtotal();
    var bg = document.getElementById('bgAnimado'), colores = ['#ff00ff','#00ffff','#ff66ff','#66ffff'];
    for (var i=0;i<15;i++) { var el=document.createElement('div'); el.className='particula'; var t=Math.random()*3+1; el.style.cssText='width:'+t+'px;height:'+t+'px;background:'+colores[Math.floor(Math.random()*colores.length)]+';left:'+Math.random()*95+'%;box-shadow:0 0 '+(t*3)+'px;animation-duration:'+(Math.random()*15+10)+'s;'; bg.appendChild(el); }
    var emojis = ['☕','🌺','🦜','🏔️','🌴','💎','🇨🇴','🎵'];
    for (var i=0;i<8;i++) { var el=document.createElement('div'); el.className='particula-emoji'; el.textContent=emojis[Math.floor(Math.random()*emojis.length)]; el.style.cssText='left:'+Math.random()*95+'%;animation-duration:'+(Math.random()*20+15)+'s;'; bg.appendChild(el); }
</script>
</body>
</html>
